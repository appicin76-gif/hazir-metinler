<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hazır Metinler</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <!-- Üst Kontrol Paneli (Arka Plan Ayarları) -->
    <div class="control-panel">
        <label for="bgColorPicker" class="control-btn">🎨 Renk Seç</label>
        <input type="color" id="bgColorPicker" value="#f0f2f5">

        <label for="bgImageUpper" class="control-btn">🖼️ Resim Yükle</label>
        <input type="file" id="bgImageUpper" accept="image/*">
        
        <button id="resetBg" class="control-btn reset-btn">🔄 Sıfırla</button>
    </div>

    <!-- Ana Konteyner -->
    <div class="app-container">
        <!-- İstenen Başlık Güncellemesi -->
        <h1>Hazır Metinler</h1>
        
        <!-- Butonların Dinamik Listeleneceği Alan -->
        <div id="textButtonsContainer" class="buttons-grid"></div>
    </div>

    <script src="script.js?v=2"></script>
</body>
</html>
